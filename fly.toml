# fly.toml — Fly.io configuration for tenant-rights service
# Deploy: fly deploy
# Provision DB: fly postgres create --name tenant-rights-db && fly postgres attach tenant-rights-db

app = "tenant-rights"
primary_region = "bos"

[build]

[[vm]]
  cpu_kind  = "shared"
  cpus      = 1
  memory_mb = 512

[env]
  LISTEN_ADDR = ":8080"
  LOG_LEVEL   = "info"
  ENV         = "production"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    interval     = "15s"
    timeout      = "5s"
    grace_period = "10s"
    method       = "GET"
    path         = "/readyz"

[metrics]
  port = 9091
  path = "/metrics"
