app = 'defensiverenting-authoring'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile.authoring'

[env]
  ENV        = 'production'
  LISTEN_ADDR = ':8081'
  LOG_LEVEL  = 'info'

[http_service]
  internal_port = 8081
  force_https   = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  initial_cluster_size = 1

[[vm]]
  cpu_kind  = 'shared'
  cpus      = 1
  memory_mb = 256
