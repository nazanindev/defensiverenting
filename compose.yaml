services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tenants
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tenants"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/tenants?sslmode=disable
      LISTEN_ADDR: ":8080"
      LOG_LEVEL: info
      ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  ingest:
    build: .
    entrypoint: ["/ingest"]
    command: ["-content", "/content", "-db", "postgres://postgres:postgres@db:5432/tenants?sslmode=disable"]
    volumes:
      - ${CONTENT_DIR:-../defensiverenting-content}:/content:ro
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/tenants?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - ingest

volumes:
  pgdata:
